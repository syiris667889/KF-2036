<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Transport Moldova 2036</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

</head>

<body>

<div class="bg"></div>

<header>

<h1>🚏 Остановка №5</h1>

<p>Школа Каларошовки</p>

</header>

<div class="container">

<div class="panel">

<h2>Маршруты</h2>

<select id="city">

<option value="">Выберите маршрут</option>

<option value="15">
Отачь — 15 лей
</option>

<option value="30">
Окница — 30 лей
</option>

<option value="45">
Единцы — 45 лей
</option>

<option value="55">
Бричаны — 55 лей
</option>

<option value="70">
Сороки — 70 лей
</option>

</select>

<button onclick="buyTicket()">

Оплатить поездку

</button>

<div id="ticket"></div>

</div>

<div class="viewer">

<canvas id="scene"></canvas>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
