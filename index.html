<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Будующее село</title>

  <link rel="stylesheet" href="style.css">

  <script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>

<body>

<div class="bg"></div>

<header>
  <h1>🚏 Остановка №5</h1>
  <p>Школа Каларошовки</p>
</header>

<div class="container">

  <div class="panel">

    <h2>Маршруты</h2>

    <select id="city">
      <option value="">Выберите маршрут</option>

      <option value="15">Отачь — 15 лей</option>

      <option value="30">Окница — 30 лей</option>

      <option value="45">Единцы — 45 лей</option>

      <option value="55">Бричаны — 55 лей</option>

      <option value="70">Сороки — 70 лей</option>
    </select>

    <button onclick="buyTicket()">
      Оплатить поездку
    </button>

    <div id="ticket"></div>

  </div>

  <div class="viewer">

    <model-viewer
      src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"

      auto-rotate

      camera-controls

      shadow-intensity="1"

      exposure="1.2">

    </model-viewer>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
