<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>🚏 Остановка №5</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<div class="bg-glow"></div>

<header class="topbar">
  <h1>🚏 Остановка №5</h1>
  <p>Школа Каларошовки</p>
</header>

<main class="container">

  <section class="glass card">
    <div class="badge">LIVE TRACKING</div>

    <h2>Выберите город</h2>

    <select id="stop">
      <option value="">— выбрать остановку —</option>
      <option value="Otaci">Отачь</option>
      <option value="Ocnita">Окница</option>
      <option value="Edinet">Единцы</option>
    </select>

    <div class="info-box">
      <p id="distance">Расстояние: —</p>
      <p id="price">Цена: —</p>
    </div>

    <button id="payBtn">Оплатить поездку</button>
  </section>

  <div id="sms" class="card glass hidden"></div>

  <div id="mapCard" class="card glass hidden">
    <div id="map"></div>
  </div>

</main>

<audio id="paySound" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-951.mp3"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
